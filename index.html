<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NebengSobat Tentena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="bg-gray-50 pb-20">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-car text-2xl"></i>
            <div>
                <h1 class="font-bold text-lg">NebengSobat Tentena</h1>
                <p class="text-xs text-blue-100">Komunitas Tebengan</p>
            </div>
        </div>
        <i class="fa-solid fa-bars text-xl"></i>
    </header>

    <!-- Tombol Utama -->
    <div class="px-4 mt-4">
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-blue-700 rounded-2xl p-4 text-white">
                <h2 class="text-xs font-bold mb-2">Nebeng Aman & Nyaman</h2>
                <button id="btn-bagikan" class="bg-white text-blue-700 font-bold px-3 py-2 rounded-lg text-xs w-full">
                    <i class="fa-solid fa-plus mr-1"></i> Bagikan Jok
                </button>
            </div>
            <div class="bg-blue-700 rounded-2xl p-4 text-white">
                <h2 class="text-xs font-bold mb-2">Lihat Daftar Jok Kosong</h2>
                <button id="btn-temukan" class="bg-white text-blue-700 font-bold px-3 py-2 rounded-lg text-xs w-full">
                    <i class="fa-solid fa-magnifying-glass mr-1"></i> Temukan Jok
                </button>
            </div>
        </div>
    </div>

    <!-- Form Input (SUDAH DITAMBAHKAN ACTION SHEETMONKEY) -->
    <main class="px-4 mt-4">
        <!-- Ganti action form di bawah ini jika kamu pakai URL SheetMonkey yang berbeda -->
        <form id="nebengForm" action="https://api.sheetmonkey.io/form/6xr8JzScmDA7KU84FLjKWp" method="POST" class="bg-white rounded-2xl p-5 shadow-sm space-y-4">
            <h3 class="font-bold text-gray-800"><i class="fa-solid fa-bullhorn mr-2"></i> Bagikan Jok Kosong</h3>
            
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase">Nama Panggilan</label>
                <input type="text" name="Nama" class="w-full mt-1 p-3 border border-gray-200 rounded-xl outline-none" required>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-500 uppercase">Tujuan</label>
                <select name="Tujuan" class="w-full mt-1 p-3 border border-gray-200 rounded-xl bg-white outline-none" required>
                    <option value="UNKRIT">Universitas Kristen Tentena</option>
                    <option value="SMAN 1">SMAN 1 Pamona Utara</option>
                    <option value="SMK GKST 1">SMK GKST 1 Tentena</option>
                </select>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-500 uppercase">Titik Jemput (GPS)</label>
                <button type="button" onclick="getLokasiOtomatis()" class="w-full mt-1 bg-gray-50 border border-dashed border-gray-300 py-3 rounded-xl text-blue-600 font-semibold text-sm">
                    <i class="fa-solid fa-location-dot mr-2"></i> Dapatkan Lokasi Saya
                </button>
                <input type="text" name="Titik Jemput" id="geo-link" class="w-full mt-2 p-2 border rounded-lg text-xs bg-gray-50" readonly required>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Jam</label>
                    <input type="text" name="Jam Berangkat" class="w-full mt-1 p-3 border rounded-xl" required>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">No. WA</label>
                    <input type="tel" name="No WA" class="w-full mt-1 p-3 border rounded-xl" required>
                </div>
            </div>

            <input type="hidden" name="Created" value="x-sheetmonkey-current-date-time" />
            
            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-200">
                <i class="fa-solid fa-rocket mr-2"></i> Buat Pengumuman
            </button>
        </form>
    </main>

    <!-- HTML Modal (YANG SEMPAT HILANG) -->
    <div id="modal-jok" class="fixed inset-0 bg-blue-900 bg-opacity-95 z-50 hidden flex flex-col">
        <div class="p-4 flex justify-between items-center text-white border-b border-blue-700">
            <h2 class="font-bold text-lg">Daftar Jok Tersedia</h2>
            <button onclick="tutupModal()" class="text-white font-bold px-3 py-1 bg-blue-800 rounded-lg">✕ Tutup</button>
        </div>
        <div id="modal-data-container" class="p-4 overflow-y-auto flex-1 space-y-3 pt-6">
            <!-- Data dari SheetDB muncul di sini -->
        </div>
    </div>

    <!-- Navigasi Bawah (YANG SEMPAT HILANG) -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around p-3 text-xs text-gray-400 z-40">
        <button id="nav-beranda" class="text-blue-600 flex flex-col items-center"><i class="fa-solid fa-house text-lg mb-1"></i> Beranda</button>
        <button id="nav-cari" class="hover:text-blue-600 flex flex-col items-center"><i class="fa-solid fa-magnifying-glass text-lg mb-1"></i> Cari</button>
        <button id="nav-jadwal" class="hover:text-blue-600 flex flex-col items-center"><i class="fa-solid fa-calendar text-lg mb-1"></i> Jadwal</button>
        <button id="nav-pesan" class="hover:text-blue-600 flex flex-col items-center"><i class="fa-solid fa-comment text-lg mb-1"></i> Pesan</button>
    </nav>

    <script>
        // FUNGSI GPS YANG HILANG
        function getLokasiOtomatis() {
            const geoLinkInput = document.getElementById('geo-link');
            if (navigator.geolocation) {
                geoLinkInput.value = "Sedang mencari lokasi...";
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    geoLinkInput.value = `https://www.google.com/maps?q=${lat},${lng}`;
                }, function(error) {
                    geoLinkInput.value = "Gagal akses GPS. Aktifkan Izin Lokasi.";
                });
            } else {
                geoLinkInput.value = "Browser tidak mendukung GPS.";
            }
        }

        // FUNGSI NAVIGASI
        document.getElementById('btn-bagikan').addEventListener('click', function() {
            document.querySelector('form').scrollIntoView({ behavior: 'smooth' });
        });

        document.getElementById('btn-temukan').addEventListener('click', function() {
            document.getElementById('modal-jok').classList.remove('hidden');
            loadDataTebengan();
        });

        function tutupModal() {
            document.getElementById('modal-jok').classList.add('hidden');
        }

        // FUNGSI LOAD DATA SHEETDB
        async function loadDataTebengan() {
            const container = document.getElementById('modal-data-container');
            container.innerHTML = '<p class="text-white text-center p-4">Memuat data...</p>';
            
            const apiUrl = 'https://sheetdb.io/api/v1/oi1whu4x406qs?sort_by=Created&sort_order=desc'; 

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.length > 0) {
                    container.innerHTML = data.map(item => `
                        <div class="bg-white p-4 rounded-2xl shadow-lg border border-gray-100 mx-2 mb-4">
                            <div class="flex justify-between items-start">
                                <div class="flex items-center gap-3">
                                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold text-xl">
                                        ${item.Nama.charAt(0).toUpperCase()}
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-gray-800 text-lg">${item.Nama}</h4>
                                        <span class="text-xs text-yellow-500 font-bold"><i class="fa-solid fa-star"></i> 4.8</span>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <div class="text-2xl font-black text-gray-800">${item.JamBerangkat}</div>
                                </div>
                            </div>
                            <div class="mt-4 grid grid-cols-2 gap-2 text-sm text-gray-600">
                                <p><i class="fa-solid fa-location-dot text-blue-500 mr-1"></i> ${item.Tujuan}</p>
                                <p><i class="fa-solid fa-car text-blue-500 mr-1"></i> Tebengan</p>
                            </div>
                            <div class="mt-4 flex gap-2">
                                <a href="${item.TitikJemput}" target="_blank" class="flex-1 text-center bg-gray-100 py-2 rounded-xl text-gray-700 font-bold text-sm">Peta</a>
                                <a href="https://wa.me/${item.NoWA}" target="_blank" class="flex-[2] text-center bg-green-600 py-2 rounded-xl text-white font-bold text-sm shadow-md">
                                    <i class="fa-brands fa-whatsapp mr-1"></i> Chat Driver
                                </a>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-white text-center p-4">Belum ada tebengan.</p>';
                }
            } catch (error) {
                container.innerHTML = '<p class="text-white text-center p-4">Gagal memuat data.</p>';
            }
        }

        // FUNGSI NAVIGASI BAWAH
        const navItems = ['nav-beranda', 'nav-cari', 'nav-jadwal', 'nav-pesan', 'nav-akun'];
        navItems.forEach(id => {
            const element = document.getElementById(id);
            if(element) {
                element.addEventListener('click', function() {
                    if(id === 'nav-beranda') {
                        window.location.reload();
                    } else {
                        alert("Fitur " + id.replace('nav-', '') + " akan segera hadir!");
                    }
                });
            }
        });
    </script>
</body>
</html>
