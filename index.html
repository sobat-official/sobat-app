<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NebengSobat Tentena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }</style>
</head>
<body class="bg-gray-50 pb-20">

    <header class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-2">
            <img src="logo.png" class="w-10 h-10 bg-white rounded-lg p-1">
            <div>
                <h1 class="font-bold text-lg">NebengSobat Tentena</h1>
                <p class="text-xs text-blue-100">Komunitas Tebengan</p>
            </div>
        </div>
        <i class="fa-solid fa-bars text-xl"></i>
    </header>

    <div class="px-4 mt-4">
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-blue-700 rounded-2xl p-4 text-white">
                <h2 class="text-xs font-bold mb-2">Sediakan jok Buat Teman Komunitas</h2>
                <button id="btn-bagikan" class="bg-white text-blue-700 font-bold px-3 py-2 rounded-lg text-xs w-full"><i class="fa-solid fa-plus mr-1"></i> Bagikan Jok</button>
            </div>
            <div class="bg-blue-700 rounded-2xl p-4 text-white">
                <h2 class="text-xs font-bold mb-2">Lihat Daftar Jok Kosong Yang Tersedia</h2>
                <button id="btn-temukan" class="bg-white text-blue-700 font-bold px-3 py-2 rounded-lg text-xs w-full"><i class="fa-solid fa-magnifying-glass mr-1"></i> Temukan Jok</button>
            </div>
        </div>
    </div>

    <main class="px-4 mt-4">
        <form id="nebengForm" class="bg-white rounded-2xl p-5 shadow-sm space-y-4">
            <h3 class="font-bold text-gray-800"><i class="fa-solid fa-bullhorn mr-2"></i> Bagikan Jok Kosong</h3>
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Nama Panggilan</label>
                <input type="text" name="Nama" class="w-full mt-1 p-3 border border-gray-200 rounded-xl" placeholder="Contoh: Ruben" required>
            </div>
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Tujuan</label>
                <select name="Tujuan" class="w-full mt-1 p-3 border border-gray-200 rounded-xl bg-white" required>
                    <option value="UNKRIT">Universitas Kristen Tentena</option>
                    <option value="STT">Sekolah Tinggi Teologi Tentena</option>
                    <option value="SMAN 1">SMAN 1 Pamona Utara</option>
                    <option value="SMA GKST 1">SMA GKST 1 Tentena</option>
                    <option value="SMA GKST 2">SMA GKST 2 Tentena</option>
                    <option value="SMK GKST 1">SMK GKST 1 Tentena</option>
                    <option value="SMK GKST 2">SMK GKST 2 Tentena</option>
                    <option value="SMK Eklesia">SMK Teknik Eklesia Tentena</option>
                </select>
            </div>
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Titik Jemput (GPS)</label>
                <button type="button" id="btn-lokasi" onclick="getLokasiOtomatis()" class="w-full mt-1 bg-gray-50 border border-dashed border-gray-300 py-3 rounded-xl text-blue-600 font-semibold text-sm">
                    <span id="icon-lokasi"><i class="fa-solid fa-location-dot mr-2"></i></span> 
                    <span id="text-lokasi">Dapatkan Lokasi Saya</span>
                </button>
                <input type="text" name="Titik Jemput" id="geo-link" class="w-full mt-2 p-2 border rounded-lg text-xs bg-gray-50" readonly required>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Jam</label>
                    <input type="text" name="Jam Berangkat" inputmode="decimal" pattern="([0-1]?[0-9]|2[0-3])[\.:]?[0-5][0-9]" placeholder="07.00" class="w-full mt-1 p-3 border rounded-xl" required>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">No. WhatsApp</label>
                    <input type="text" name="No WA" id="no-wa" placeholder="+62 8xx xxx xxx xx" inputmode="numeric" pattern="[0-9\+\s]*" class="w-full mt-1 p-3 border rounded-xl" oninput="formatWA(this)" maxlength="18" required>
                </div>
            </div> <input type="hidden" name="Created" value="x-sheetmonkey-current-date-time" />
            
            <div class="flex gap-3 w-full mt-4">
                <button type="submit" class="flex-[7] bg-blue-600 text-white py-4 rounded-xl font-bold shadow-md hover:bg-blue-700 transition active:scale-95 flex items-center justify-center text-sm md:text-base">
                    <i class="fa-solid fa-rocket mr-2"></i> <span>Bagikan Jok</span>
                </button>
                <button type="button" onclick="bukaDonasi()" class="flex-[3] bg-amber-500 text-white py-4 rounded-xl font-bold shadow-md hover:bg-amber-600 transition active:scale-95 flex items-center justify-center text-sm md:text-base">
                    <i class="fa-solid fa-coffee mr-2"></i> <span>Traktir</span>
                </button>
            </div>
        </form>
    </main>

    <script>
        // Copy-paste fungsi JavaScript lama kamu ke sini
        let semuaData = [];

        async function loadDataTebengan() {
            const container = document.getElementById('modal-data-container');
            container.innerHTML = '<p class="text-white text-center p-4">Memuat data...</p>';
            try {
                const response = await fetch('https://sheetdb.io/api/v1/oi1whu4x406qs?sort_by=Created&sort_order=desc');
                semuaData = await response.json();
                tampilkanData(semuaData);
            } catch (e) { container.innerHTML = '<p class="text-white">Gagal memuat.</p>'; }
        }

        function tampilkanData(data) {
            const container = document.getElementById('modal-data-container');
            container.innerHTML = data.length > 0 ? data.map(item => `
                <div class="bg-white p-4 rounded-2xl shadow-lg border border-gray-100">
                    <div class="flex justify-between items-center"><h4 class="font-bold text-gray-800">${item.Nama}</h4><span class="text-blue-600 font-black">${item['Jam Berangkat']}</span></div>
                    <div class="text-sm text-gray-600 my-1"><i class="fa-solid fa-location-dot mr-1 text-blue-500"></i> ${item.Tujuan}</div>
                    
<div class="mt-3 flex gap-2">
    <!-- Tombol Peta lebih kecil (flex-1) -->
    <a href="${item['Titik Jemput']}" target="_blank" class="flex-1 text-center bg-gray-100 py-2 rounded-xl text-sm font-bold text-gray-700">
        Peta
    </a>
    <!-- Tombol Chat Driver lebih lebar (flex-[2]) dan warna hijau -->
    <a href="https://wa.me/${item['No WA'].replace(/\s/g, '')}?text=Halo%20${item.Nama.split(' ')[0]},%20saya%20tertarik%20dengan%20tebengan%20ke%20${item.Tujuan}%20yang%20dibagikan%20lewat%20NebengSobat.%20Apakah%20joknya%20masih%20tersedia?" target="_blank" class="flex-[2] text-center bg-green-500 py-2 rounded-xl text-white text-sm font-bold shadow-md hover:bg-green-600 transition">
    <i class="fa-brands fa-whatsapp mr-1"></i> Chat Driver
</a>
</div>
                </div>`).join('') : '<p class="text-white text-center">Data tidak ditemukan.</p>';
        }

        function filterData() {
            const teks = document.getElementById('filterTujuan').value.toLowerCase();
            const waktu = document.getElementById('filterWaktu').value;
            const hasil = semuaData.filter(item => {
                const cocokTujuan = item.Tujuan.toLowerCase().includes(teks);
                let cocokWaktu = true;
                const jam = parseInt(item['Jam Berangkat'].split(':')[0]);
                if (waktu === 'Pagi') cocokWaktu = (jam >= 5 && jam < 11);
                else if (waktu === 'Siang') cocokWaktu = (jam >= 11 && jam < 15);
                else if (waktu === 'Sore') cocokWaktu = (jam >= 15 && jam < 18);
                else if (waktu === 'Malam') cocokWaktu = (jam >= 18 || jam < 5);
                return cocokTujuan && cocokWaktu;
            });
            tampilkanData(hasil);
        }

        // Fungsi Pendukung lainnya
        document.getElementById('btn-bagikan').onclick = () => document.getElementById('nebengForm').scrollIntoView({ behavior: 'smooth' });
        document.getElementById('btn-temukan').onclick = () => { document.getElementById('modal-jok').classList.remove('hidden'); loadDataTebengan(); };
        function tutupModal() { document.getElementById('modal-jok').classList.add('hidden'); }
        function bukaDonasi() { document.getElementById('modal-donasi').classList.remove('hidden'); }
        function tutupDonasi() { document.getElementById('modal-donasi').classList.add('hidden'); }
        
       async function getLokasiOtomatis() {
    const inputLink = document.getElementById('geo-link');
    const btn = document.getElementById('btn-lokasi');
    const text = document.getElementById('text-lokasi');
    
    if (navigator.geolocation) {
        text.innerText = "Mengambil...";
        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            // Format link yang benar untuk dibuka di HP
            inputLink.value = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
            
            text.innerText = "Berhasil!";
            btn.classList.add('border-green-500', 'text-green-600', 'bg-green-50');
        }, (err) => {
            alert("Gagal. Aktifkan izin lokasi di browser.");
            text.innerText = "Dapatkan Lokasi Saya";
        });
    } else {
        alert("Browser tidak mendukung lokasi.");
    }
}
        
        document.getElementById('nebengForm').onsubmit = async (e) => {
    e.preventDefault();
    
    // 1. Ambil elemen tombol
    const submitBtn = e.target.querySelector('button[type="submit"]');
    const originalText = submitBtn.innerHTML;
    
    // 2. Ubah status tombol menjadi Loading
    submitBtn.disabled = true;
    submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
    submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Mengirim...';
    
    try {
        // 3. Kirim data
        await fetch('https://api.sheetmonkey.io/form/6xr8JzScmDA7KU84FLjKWp', { 
            method: 'POST', 
            body: new FormData(e.target) 
        });
        
        // 4. Sukses: Reset form dan tampilkan pesan
        alert('Berhasil! Jok kamu sudah dibagikan.');
        e.target.reset();
    } catch (error) {
        alert('Gagal mengirim data, silakan coba lagi.');
    } finally {
        // 5. Kembalikan tombol ke kondisi semula
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
        submitBtn.innerHTML = originalText;
    }
};
    </script>
    <script>
    function formatWA(input) {
        let val = input.value.replace(/\D/g, '');
        if (val.startsWith('0')) val = '62' + val.substring(1);
        
        let formatted = val;
        if (val.length > 0) {
            formatted = '+' + val.substring(0, 2);
            if (val.length > 2) formatted += ' ' + val.substring(2, 5);
            if (val.length > 5) formatted += ' ' + val.substring(5, 8);
            if (val.length > 8) formatted += ' ' + val.substring(8, 11);
            if (val.length > 11) formatted += ' ' + val.substring(11, 15);
        }
        input.value = formatted;
    }
        // Tambahkan event listener di bagian bawah script kamu
document.querySelector('input[name="Jam Berangkat"]').addEventListener('blur', function(e) {
    let val = e.target.value.replace(/[^0-9]/g, ''); // Hapus semua selain angka
    if (val.length >= 3 && val.length <= 4) {
        let jam = val.length === 3 ? val.substring(0, 1) : val.substring(0, 2);
        let menit = val.slice(-2);
        e.target.value = jam.padStart(2, '0') + "." + menit;
    }
});
    </script>
</body>
</html>
