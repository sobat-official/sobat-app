<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NebengSobat Tentena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="bg-gray-50 pb-20">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-2">
            <img src="logo.png" class="w-10 h-10 bg-white rounded-lg p-1">
            <div>
                <h1 class="font-bold text-lg">NebengSobat Tentena</h1>
                <p class="text-xs text-blue-100">Komunitas Tebengan</p>
            </div>
        </div>
        <i class="fa-solid fa-bars text-xl"></i>
    </header>

    <!-- Banner -->
    <div class="p-4">
        <div class="bg-blue-700 rounded-2xl p-5 text-white relative overflow-hidden">
            <h2 class="text-lg font-bold w-2/3">Nebeng Aman, Nyaman, dan Terpercaya</h2>
            <button id="btn-bagikan" class="mt-4 bg-white text-blue-700 font-bold px-4 py-2 rounded-lg text-sm">
                <i class="fa-solid fa-plus mr-1"></i> Bagikan Jok
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="px-4">
        <form id="nebengForm" class="bg-white rounded-2xl p-5 shadow-sm space-y-4">
            <h3 class="font-bold text-gray-800"><i class="fa-solid fa-bullhorn mr-2"></i> Bagikan Jok Kosong</h3>
            
            <!-- Nama -->
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Nama Panggilan</label>
                <input type="text" name="Nama" class="w-full mt-1 p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Contoh: Ruben" required>
            </div>

            <!-- Tujuan -->
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Tujuan</label>
                <select name="Tujuan" class="w-full mt-1 p-3 border border-gray-200 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 outline-none" required>
                    <option value="Unkrit">Unkrit Tentena</option>
                    <option value="SMAN 1">SMAN 1 Pamona Utara</option>
                    <option value="SMKN 1">SMKN 1 Pamona Poso</option>
                </select>
            </div>

            <!-- Titik Jemput -->
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Titik Jemput (GPS)</label>
                <button type="button" onclick="getLokasiOtomatis()" class="w-full mt-1 bg-gray-50 border border-dashed border-gray-300 py-3 rounded-xl text-blue-600 font-semibold text-sm hover:bg-gray-100 transition">
                    <i class="fa-solid fa-location-dot mr-2"></i> Dapatkan Lokasi Saya
                </button>
                <input type="text" name="Titik Jemput" id="geo-link" class="w-full mt-2 p-2 border rounded-lg text-xs bg-gray-50" placeholder="Link akan otomatis terisi..." readonly required>
            </div>

            <!-- Baris Jam & WA -->
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Jam</label>
                    <input type="text" name="Jam Berangkat" placeholder="07.00 WITA" class="w-full mt-1 p-3 border rounded-xl" required>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">No. WA</label>
                    <input type="tel" name="No WA" placeholder="08xx..." class="w-full mt-1 p-3 border rounded-xl" required>
                </div>
            </div>

            <input type="hidden" name="Created" value="x-sheetmonkey-current-date-time" />
            
            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition active:scale-95">
                <i class="fa-solid fa-rocket mr-2"></i> Buat Pengumuman
            </button>
        </form>

        <!-- Tambahkan script GPS agar tombolnya berfungsi -->
        <script>
    // 1. Fungsi Lokasi
    function getLokasiOtomatis() {
        const btn = event.target.closest('button');
        const inputLink = document.getElementById('geo-link');
        
        if (navigator.geolocation) {
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Mengambil...';
            navigator.geolocation.getCurrentPosition((position) => {
                inputLink.value = `https://maps.google.com/?q=${position.coords.latitude},${position.coords.longitude}`;
                btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i> Lokasi Terambil!';
                btn.classList.replace('bg-gray-50', 'bg-green-50');
            });
        }
    }

    // 2. Fungsi Kirim Data (Tanpa Pindah Halaman)
    const form = document.getElementById('nebengForm');
    form.addEventListener('submit', async (e) => {
        e.preventDefault(); // Mencegah pindah halaman
        
        const btnSubmit = form.querySelector('button[type="submit"]');
        btnSubmit.innerHTML = 'Mengirim...';
        btnSubmit.disabled = true;

        const data = new FormData(form);
        await fetch('https://api.sheetmonkey.io/form/6xr8JzScmDA7KU84FLjKWp', {
            method: 'POST',
            body: data,
        });

        // Setelah sukses
        alert('Data berhasil dikirim! Tebengan kamu sudah muncul.');
        form.reset(); // Kosongkan form
        btnSubmit.innerHTML = 'Buat Pengumuman';
        btnSubmit.disabled = false;
    });
</script>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around p-3 text-gray-500">
        <div id class="text-blue-600 text-center text-xs"><i class="fa-solid fa-house block text-lg"></i>Beranda</div>
        <div id class="text-center text-xs"><i class="fa-solid fa-magnifying-glass block text-lg"></i>Cari</div>
        <div id class="text-center text-xs"><i class="fa-solid fa-calendar block text-lg"></i>Jadwal</div>
        <div id class="text-center text-xs"><i class="fa-solid fa-comment block text-lg"></i>Pesan</div>
        <div id class="text-center text-xs"><i class="fa-solid fa-user block text-lg"></i>Akun</div>
    </nav>
<script>
    // 1. Fungsi Tombol "Bagikan Jok" ke Form
    document.getElementById('btn-bagikan').addEventListener('click', function() {
        document.querySelector('form').scrollIntoView({ behavior: 'smooth' });
    });

    // 2. Fungsi Navigasi Bawah
    const navItems = ['nav-beranda', 'nav-cari', 'nav-jadwal', 'nav-pesan', 'nav-akun'];
    navItems.forEach(id => {
        document.getElementById(id).addEventListener('click', function() {
            if(id === 'nav-beranda') {
                window.location.reload(); // Refresh untuk kembali ke posisi atas
            } else {
                alert("Fitur " + id.replace('nav-', '') + " sedang dalam tahap pengembangan, Ruben!");
            }
        });
    });
</script>
    
</body>
</html>
