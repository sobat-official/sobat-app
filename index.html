<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NebengSobat - Komunitas Tebengan Tentena</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-800">

    <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white sticky top-0 z-50 shadow-sm">
        <div class="max-w-md mx-auto px-4 py-4">
            <h1 class="text-xl font-black">NebengSobat Tentena</h1>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 py-6">
        <form id="nebengForm" class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <div class="space-y-3 text-sm">
                <input type="text" name="nama" id="driver-name" placeholder="Nama Panggilan" class="w-full px-3 py-2.5 border rounded-xl" required>
                <select name="tujuan" id="route-to" class="w-full px-3 py-2.5 border rounded-xl" required>
                    <option value="">-- Pilih Tujuan --</option>
                    <option value="Unkrit">Unkrit</option>
                    <option value="SMAN 1">SMAN 1 Pamona Utara</option>
                </select>
                <button type="button" onclick="getLokasiOtomatis()" id="btn-gps" class="w-full bg-slate-100 py-2 rounded-xl">📍 Dapatkan Lokasi</button>
                <input type="hidden" name="titik_jemput" id="geo-link">
                <input type="text" name="jam_berangkat" id="departure-time" placeholder="Jam Berangkat" class="w-full px-3 py-2.5 border rounded-xl" required>
                <input type="text" name="no_wa" id="driver-wa" placeholder="No. WA" class="w-full px-3 py-2.5 border rounded-xl" required>
                
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">
                    🚀 Bagikan ke Database & WA
                </button>
            </div>
        </form>

        <section id="output-section" class="hidden mt-6 bg-emerald-50 p-5 rounded-2xl">
            <textarea id="wa-text-result" class="w-full h-32 p-2 text-xs border rounded-xl" readonly></textarea>
            <button onclick="salinTeksWA()" class="w-full mt-2 bg-emerald-600 text-white py-2 rounded-xl">📋 Salin Teks</button>
        </section>
    </main>

    <script>
        // FUNGSI LOKASI
        function getLokasiOtomatis() {
            navigator.geolocation.getCurrentPosition((pos) => {
                document.getElementById('geo-link').value = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
                alert("Lokasi berhasil dikunci!");
            });
        }

        // FUNGSI GABUNGAN: SIMPAN KE SHEETS & BUAT TEKS WA
        document.getElementById('nebengForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const scriptURL = 'https://script.google.com/macros/s/AKfycbx1r6604N9KWke-IotKx9o9UfGwdYW6ZBsg5ufjHxg_AOFK5qUj5yX00tQ0n4UPjEruDw/exec';
            
            // 1. Kirim ke Database
            fetch(scriptURL, { method: 'POST', body: new FormData(this) });
            alert("Data berhasil tersimpan!");

            // 2. Buat Teks WA
            const name = document.getElementById('driver-name').value;
            const wa = document.getElementById('driver-wa').value;
            const template = `Halo, saya ${name}. Mau nebeng? Hubungi saya di ${wa}`;
            
            document.getElementById('wa-text-result').value = template;
            document.getElementById('output-section').classList.remove('hidden');
        });

        function salinTeksWA() {
            navigator.clipboard.writeText(document.getElementById('wa-text-result').value);
            alert("Teks disalin!");
        }
    </script>
</body>
</html>
